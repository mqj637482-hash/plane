<script>
const QINIU_AK = "71oeypROB7tE57yfzZ9_9E9G0IHZMeJQ-fUGPkna";
const QINIU_SK = "d07lSTfLVnZBmUZjw4zzdvA3vCFEQvGe2fTICNtH";
const QINIU_BUCKET = "qjstudio";
const QINIU_DOMAIN = "https://tbz0i03n9.hd-bkt.clouddn.com";
const QINIU_REGION = qiniu.region.z0; // 华东

async function generateQiniuToken() {
  const deadline = Math.floor(Date.now() / 1000) + 3600;
  const policy = JSON.stringify({"scope": QINIU_BUCKET, "deadline": deadline});
  const encoded = btoa(policy).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
  const key = await crypto.subtle.importKey(
    'raw', new TextEncoder().encode(QINIU_SK),
    {name: 'HMAC', hash: 'SHA-1'}, false, ['sign']
  );
  const sig = await crypto.subtle.sign('HMAC', key, new TextEncoder().encode(encoded));
  const sign = btoa(String.fromCharCode(...new Uint8Array(sig)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
  return `${QINIU_AK}:${sign}:${encoded}`;
}

async function qiniuUpload(file, cloudKey) {
  const token = await generateQiniuToken();
  console.log('Uploading with token:', token.substring(0, 50) + '...');
  return new Promise((resolve, reject) => {
    const observable = qiniu.upload(file, cloudKey, token, {}, {
      region: qiniu.region.z0
    });
    observable.subscribe({
      next(res) { console.log('Progress:', res.total.percent + '%'); },
      error(err) { reject(new Error('上传失败: ' + JSON.stringify(err))); },
      complete(res) {
        resolve({ fileID: res.key, url: QINIU_DOMAIN + '/' + res.key });
      }
    });
  });
}

  //背景图轮播（腾讯云，国内外通用）────────────
  function loadBgImages() {
    const urls = ["https://716a-qjstudio-9ghhupv9c36e4853-1411556771.tcb.qcloud.la/bg/DSC08346.jpg","https://716a-qjstudio-9ghhupv9c36e4853-1411556771.tcb.qcloud.la/bg/DSC08348.jpg","https://716a-qjstudio-9ghhupv9c36e4853-1411556771.tcb.qcloud.la/bg/DSC08703.jpg","https://716a-qjstudio-9ghhupv9c36e4853-1411556771.tcb.qcloud.la/bg/DSC08867.jpg","https://716a-qjstudio-9ghhupv9c36e4853-1411556771.tcb.qcloud.la/bg/DSC08986.jpg","https://716a-qjstudio-9ghhupv9c36e4853-1411556771.tcb.qcloud.la/bg/DSC09109.jpg","https://716a-qjstudio-9ghhupv9c36e4853-1411556771.tcb.qcloud.la/bg/DSC09351.jpg"];
    let current = Math.floor(Math.random() * urls.length);
    const bg1 = document.getElementById('site-bg');
    const bg2 = document.getElementById('site-bg2');
    if (!bg1 || !bg2) return;
    let active = bg1, inactive = bg2;
    const img = new Image();
    img.onload = () => {
      active.style.backgroundImage = 'url(' + urls[current] + ')';
      active.style.opacity = '1';
    };
    img.src = urls[current];
    // Simultaneous crossfade - both fade at same time
    function crossfadeTo(nextIdx) {
      const preload = new Image();
      preload.onload = () => {
        inactive.style.backgroundImage = 'url(' + urls[nextIdx] + ')';
        inactive.style.opacity = '1';
        active.style.opacity = '0';
        setTimeout(() => { [active, inactive] = [inactive, active]; }, 300);
      };
      preload.src = urls[nextIdx];
    }
    setInterval(() => {
      current = (current + 1) % urls.length;
      crossfadeTo(current);
    }, 8000);
  }

  function setupUploadHandlers() {
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');
    const submitBtn = document.getElementById('submitBtn');
    const addMoreBtn = document.getElementById('addMoreBtn');
    let selectedFiles = [];

    // Show/hide xianyu order ID field
    document.querySelectorAll('input[name="payMethod"]').forEach(el => {
      el.addEventListener('change', () => {
        const group = document.getElementById('xianyu-order-group');
        if (group) group.style.display = el.value === 'xianyu' ? 'flex' : 'none';
      });
    });

    fileInput.addEventListener('change', e => {
      if (e.target.files.length > 0) addFiles(e.target.files);
      // Reset input so same file can be re-added
      e.target.value = '';
    });
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); addFiles(e.dataTransfer.files); });

    function addFiles(files) {
      // Accumulate files, avoid duplicates by name
      const existing = new Set(selectedFiles.map(f => f.name));
      const newFiles = [...files].filter(f => !existing.has(f.name));
      selectedFiles = [...selectedFiles, ...newFiles];
      renderFileList();
    }

    function removeFile(index) {
      selectedFiles.splice(index, 1);
      renderFileList();
    }

    function renderFileList() {
      if (selectedFiles.length === 0) {
        fileList.innerHTML = '';
        submitBtn.disabled = true;
        document.getElementById('submitText').textContent = '请先选择文件';
        addMoreBtn.style.display = 'none';
        return;
      }
      fileList.innerHTML = selectedFiles.map((f, i) => `
        <div class="file-item">
          <span class="file-dot"></span>
          <span class="file-name">${f.name}</span>
          <span class="file-size">${(f.size/1024/1024).toFixed(1)} MB</span>
          <button onclick="window._removeFile(${i})" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:0 4px;">✕</button>
        </div>`).join('');
      submitBtn.disabled = false;
      document.getElementById('submitText').textContent = `提交 ${selectedFiles.length} 个文件`;
      addMoreBtn.style.display = 'flex';
    }

    window._removeFile = (index) => {
      removeFile(index);
    };
    submitBtn.addEventListener('click', async () => {
      const name = document.getElementById('clientName').value.trim();
      const email = document.getElementById('clientEmail').value.trim();
      const note = document.getElementById('clientNote').value.trim();
      const resEl = document.querySelector('input[name="res"]:checked');
      const resolution = resEl ? resEl.value : '1500px';
      if (!name || !email) { alert('请填写姓名和邮箱'); return; }
      if (!selectedFiles.length) { alert('请选择至少一个文件'); return; }
      submitBtn.disabled = true;
      const orderId = generateId();
      const fileInfos = [];
      try {
        for (let i = 0; i < selectedFiles.length; i++) {
          const file = selectedFiles[i];
          document.getElementById('submitText').textContent = `上传中 ${i+1} / ${selectedFiles.length}…`;
          const cloudPath = `orders/${orderId}/raw/${Date.now()}_${file.name}`;
          const { fileID, url } = await uploadToQiniu(file, cloudPath);
          fileInfos.push({ name: file.name, fileID, url, size: file.size });
        }
        const payMethodEl = document.querySelector('input[name="payMethod"]:checked');
        const payMethod = payMethodEl ? payMethodEl.value : 'qr';
        const xianyuOrderId = document.getElementById('xianyuOrderId')?.value.trim() || '';
        if (payMethod === 'xianyu' && !xianyuOrderId) {
          alert('请填写闲鱼订单号');
          submitBtn.disabled = false;
          document.getElementById('submitText').textContent = `提交 ${selectedFiles.length} 个文件`;
          return;
        }
        await setDoc(doc(db,'orders',orderId), {
          orderId, clientName: name, clientEmail: email,
          note, resolution, rawFiles: fileInfos, payMethod,
          status: 'pending', paid: payMethod === 'xianyu',
          xianyuOrderId: xianyuOrderId || '',
          createdAt: serverTimestamp()
        });
        try {
          await emailjs.send("service_3xddfxh", "template_sjit2jo", {
            order_id: orderId, client_name: name, client_email: email,
            resolution, file_count: fileInfos.length + " 个",
            note: note || "（无备注）",
            pay_method: payMethod === 'xianyu' ? `🐟 闲鱼下单（订单号：${xianyuOrderId}）` : '💳 微信 / 支付宝扫码',
            xianyu_order_id: xianyuOrderId || '—',
            order_link: window.location.origin + window.location.pathname + "#order/" + orderId
          });
        } catch(e) { console.warn("邮件通知失败", e); }
        window.location.hash = `#order/${orderId}`;
      } catch(err) {
        alert('上传失败，请检查网络后重试。');
        console.error(err);
        submitBtn.disabled = false;
        document.getElementById('submitText').textContent = `提交 ${selectedFiles.length} 个文件`;
      }
    });
  }

  async function renderAdmin() {
    document.getElementById('app').innerHTML = `
      <div class="page">
        <header class="header">
          <div class="logo">QJ <span class="logo-sub">修图小作坊</span> <span class="admin-tag">后台管理</span></div>
          <a href="#" class="header-link" onclick="sessionStorage.removeItem('admin_auth')">退出登录</a>
        </header>
        <main class="admin-main"><div id="adminList"><div class="loading">加载订单中…</div></div></main>
        <footer class="footer">© QJ 修图小作坊 · 专业修图服务</footer>
      </div>`;

    onSnapshot(collection(db,'orders'), snap => {
      if (snap.empty) {
        document.getElementById('adminList').innerHTML = `<div class="empty-state">暂无订单</div>`;
        return;
      }
      const orders = snap.docs.map(d=>d.data()).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
      document.getElementById('adminList').innerHTML = `
        <div class="admin-grid">
          ${orders.map(o => `
            <div class="admin-card">
              <div class="admin-card-header">
                <div>
                  <div class="admin-order-id">${o.orderId}</div>
                  <div class="admin-client">${o.clientName} · ${o.clientEmail}</div>
                  <div class="admin-meta">分辨率：${o.resolution||'未指定'} · ${o.rawFiles?.length||0} 个文件</div>
                  ${o.note ? `<div class="admin-note">备注：${o.note}</div>` : ''}
                </div>
                <div class="admin-actions">
                  <select class="status-select" onchange="window._updateStatus('${o.orderId}',this.value)">
                    <option value="pending" ${o.status==='pending'?'selected':''}>◷ 已收到</option>
                    <option value="editing" ${o.status==='editing'?'selected':''}>◈ 修图中</option>
                    <option value="delivered" ${o.status==='delivered'?'selected':''}>✓ 已完成</option>
                  </select>
                  <button class="pay-confirm-btn ${o.paid?'paid':''}" onclick="window._confirmPay('${o.orderId}',${o.paid})">
                    ${o.paid ? '✓ 已收款' : '确认收款'}
                  </button>
                </div>
              </div>
              <div class="admin-section">
                <div class="admin-section-label">原始文件（点击下载）</div>
                <div class="raw-list">
                  ${(o.rawFiles||[]).map(f=>`<a class="raw-item" href="${f.url}" target="_blank">↓ ${f.name} <span class="raw-size">${(f.size/1024/1024).toFixed(1)} MB</span></a>`).join('')}
                </div>
              </div>
              <div class="admin-section">
                <div class="admin-section-label">上传修好的照片</div>
                <input type="file" multiple accept=".jpg,.jpeg,.png,.webp" id="jpg-${o.orderId}" hidden onchange="window._uploadJpgs('${o.orderId}',this.files)"/>
                <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
                  <label class="upload-jpg-label" for="jpg-${o.orderId}">＋ 选择照片（可多选）</label>
                  ${o.jpgFiles?.length ? `<button class="notify-client-btn" onclick="window._notifyClient('${o.orderId}','${o.clientName}','${o.clientEmail}')">✉ 发送给客户</button>` : ''}
                </div>
                <div class="jpg-progress" id="progress-${o.orderId}"></div>
                ${o.jpgFiles?.length ? `
                  <div class="delivered-label">已交付 ${o.jpgFiles.length} 张</div>
                  <div class="jpg-preview-grid">
                    ${o.jpgFiles.map((f,i)=>`<div class="jpg-preview-item"><img src="${f.url}" class="jpg-thumb"/><div class="jpg-thumb-name">${f.name}</div><button class="delete-jpg-btn" onclick="window._deleteJpg('${o.orderId}',${i})">删除</button></div>`).join('')}
                  </div>` : ''}
              </div>
            </div>`).join('')}
        </div>`;
    });

    window._updateStatus = async (orderId, status) => {
      await updateDoc(doc(db,'orders',orderId), {status});
    };
    window._confirmPay = async (orderId, currentPaid) => {
      await updateDoc(doc(db,'orders',orderId), {paid: !currentPaid});
    };
    window._notifyClient = async (orderId, clientName, clientEmail) => {
      if (!confirm(`确认发送邮件通知给 ${clientName}（${clientEmail}）？`)) return;
      const orderLink = window.location.origin + window.location.pathname + '#order/' + orderId;
      try {
        await emailjs.send("service_3xddfxh", "template_f0w4jsf", {
          order_id: orderId, client_name: clientName,
          client_email: clientEmail, order_link: orderLink
        });
        alert('✓ 邮件已发送给客户！');
      } catch(err) { alert('邮件发送失败：' + err.message); }
    };
    window._deleteOrder = async (orderId) => {
      if (!confirm(`确认删除订单 #${orderId}？此操作无法撤回。`)) return;
      try {
        const { deleteDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
        const q = await getDocs(query(collection(db,'orders'), where('orderId','==',orderId)));
        if (!q.empty) await deleteDoc(q.docs[0].ref);
        alert('✓ 订单已删除');
      } catch(err) {
        alert('删除失败：' + err.message);
      }
    };

    window._deleteJpg = async (orderId, index) => {
      if (!confirm('确认删除这张照片？')) return;
      try {
        const q = await getDocs(query(collection(db,'orders'), where('orderId','==',orderId)));
        if (q.empty) throw new Error('订单不存在');
        const docRef = q.docs[0].ref;
        const jpgFiles = [...(q.docs[0].data().jpgFiles || [])];
        jpgFiles.splice(index, 1);
        await updateDoc(docRef, { jpgFiles });
        alert('✓ 照片已删除');
      } catch(err) {
        alert('删除失败：' + err.message);
      }
    };

    window._uploadJpgs = async (orderId, files) => {
      const progress = document.getElementById(`progress-${orderId}`);
      progress.textContent = '上传中…';
      progress.className = 'jpg-progress uploading';
      try {
        const existingSnap = await new Promise(resolve => {
          const unsub = onSnapshot(doc(db,'orders',orderId), snap => { unsub(); resolve(snap); });
        });
        const existingJpgs = existingSnap.data()?.jpgFiles || [];
        const jpgFiles = [];
        for (let i = 0; i < files.length; i++) {
          progress.textContent = `上传中 ${i+1} / ${files.length}…`;
          const file = files[i];
          const cloudPath = `orders/${orderId}/jpg/${Date.now()}_${file.name}`;
          const { fileID, url } = await uploadToQiniu(file, cloudPath);
          jpgFiles.push({ name: file.name, fileID, url });
        }
        const allJpgs = [...existingJpgs, ...jpgFiles];
        await updateDoc(doc(db,'orders',orderId), { jpgFiles: allJpgs, status: 'delivered' });
        progress.textContent = `✓ 成功上传 ${jpgFiles.length} 张`;
        progress.className = 'jpg-progress done';
      } catch(err) {
        progress.textContent = '上传失败：' + err.message;
        progress.className = 'jpg-progress error';
      }
    };
  }
</script>

.req-title{font-size:13px;font-weight:600;color:#fff;margin-bottom:10px;letter-spacing:.04em}

.req-item{font-size:12px;line-height:1.5}
.req-ok{color:rgba(120,220,150,.95)}
.req-no{color:rgba(255,150,150,.95)}
.footer-main{margin-bottom:6px}
.footer-links{display:flex;align-items:center;gap:8px;justify-content:center}
.footer-link{cursor:pointer;text-decoration:underline;opacity:.7}
.footer-link:hover{opacity:1}
.footer-dot{opacity:.4}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal-card{background:#fff;border-radius:var(--r);padding:32px;max-width:480px;width:100%;max-height:80vh;overflow-y:auto;display:flex;flex-direction:column;gap:16px}
.modal-title{font-size:18px;font-weight:500}
.modal-body{font-size:13px;color:var(--text2);line-height:1.8;flex:1}
.modal-close{background:var(--text);color:#fff;border:none;border-radius:var(--r2);padding:10px 24px;font-family:inherit;font-size:14px;cursor:pointer;align-self:flex-end}
.add-more-btn{background:transparent;border:1px dashed var(--border2);border-radius:var(--r2);padding:8px 16px;font-family:inherit;font-size:13px;color:var(--text2);cursor:pointer;align-self:flex-start}
.info-section{display:flex;flex-direction:column;gap:20px;margin-top:24px;max-width:640px;margin-left:auto;margin-right:auto;width:100%;padding:0 24px 80px}
.info-block{background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:var(--r);padding:24px}
.info-block-title{font-size:15px;font-weight:700;margin-bottom:16px;color:var(--text);letter-spacing:.01em;display:flex;align-items:center;gap:8px}
.req-grid{display:flex;flex-direction:column;gap:8px}
.req-row{font-size:13px;padding:9px 12px 9px 14px;border-radius:6px;line-height:1.5}
.req-ok{background:rgba(40,167,80,.15);color:#1a7a3a;border-left:3px solid #28a750;font-weight:500}
.req-no{background:rgba(220,50,50,.12);color:#b52020;border-left:3px solid #dc3232;font-weight:500}
.samples-hint{font-size:12px;color:var(--text3);margin-bottom:12px}
.samples-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.samples-loading{font-size:13px;color:var(--text3);padding:20px 0}
.sample-item{border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.sample-img{width:100%;aspect-ratio:3/2;object-fit:cover;display:block}
.terms-grid{display:flex;flex-direction:column;gap:14px}
.terms-item{display:flex;gap:16px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.terms-item:last-child{border-bottom:none;padding-bottom:0}
.terms-label{font-size:13px;font-weight:700;color:var(--text);flex-shrink:0;width:76px;padding-top:2px}
.terms-value{font-size:13px;color:var(--text2);line-height:1.75}
.hamburger{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;gap:5px;padding:6px;border-radius:6px;transition:background .15s}
.hamburger:hover{background:var(--bg3)}
.hamburger span{display:block;width:22px;height:2px;background:var(--text);border-radius:2px;transition:background .15s}
.about-card{max-width:560px;max-height:85vh}
.about-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.modal-x{background:none;border:none;font-size:18px;cursor:pointer;color:var(--text3);padding:4px 8px;border-radius:4px}
.modal-x:hover{color:var(--text);background:var(--bg3)}
.about-section{margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.about-section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.about-section-title{font-size:14px;font-weight:600;margin-bottom:10px;color:var(--text)}
.about-section p{font-size:13px;color:var(--text2);line-height:1.8;margin-bottom:8px}
.about-section p:last-child{margin-bottom:0}
.about-highlight{background:var(--bg3);border-radius:var(--r2);padding:16px;margin-left:-4px;margin-right:-4px}
.audience-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.audience-item{background:var(--bg3);border-radius:8px;padding:12px}
.audience-icon{font-size:18px;margin-bottom:6px}
.audience-label{font-size:12px;font-weight:500;color:var(--text);margin-bottom:4px}
.audience-desc,.audience-desc2{font-size:12px;color:var(--text2);line-height:1.5}
.contact-list{display:flex;flex-direction:column;gap:10px}
.contact-row{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text2)}
.contact-icon{font-size:16px}
.inline-req{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px}
.inline-req-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:10px;letter-spacing:.04em;display:flex;align-items:center;gap:6px}
.inline-req-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.block-icon{display:inline-flex;align-items:center;vertical-align:middle;margin-right:4px;color:var(--text2)}
.inline-req-title .block-icon{color:var(--text3)}
.pay-order-note{background:rgba(0,0,0,.04);border:1px solid var(--border);border-radius:var(--r2);padding:12px 16px;display:flex;align-items:center;gap:12px;width:100%;flex-wrap:wrap}
.pay-order-label{font-size:12px;color:var(--text3);flex-shrink:0}
.pay-order-id{font-size:16px;font-weight:600;letter-spacing:.12em;color:var(--text);flex:1}
.pay-copy-btn{background:transparent;border:1px solid var(--border2);border-radius:6px;padding:5px 12px;font-family:inherit;font-size:12px;color:var(--text2);cursor:pointer;flex-shrink:0;transition:all .15s}
.pay-copy-btn:hover{border-color:var(--text);color:var(--text)}
.pay-method-group{display:flex;gap:10px;flex-wrap:wrap}
.pay-method-option input{display:none}
.pay-method-tag{display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 20px;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r2);cursor:pointer;transition:all .15s;min-width:120px}
.pay-method-option input:checked + .pay-method-tag{background:var(--text);border-color:var(--text)}
.pay-method-icon{font-size:20px}
.pay-method-text{font-size:13px;font-weight:600;color:var(--text)}
.pay-method-sub{font-size:11px;color:var(--text3)}
.pay-method-option input:checked + .pay-method-tag .pay-method-text,
.pay-method-option input:checked + .pay-method-tag .pay-method-sub{color:#fff}
.xianyu-notice{background:#fff8ec;border:1px solid #f0d090;border-radius:var(--r);padding:16px 20px;display:flex;align-items:center;gap:14px}
.xianyu-icon{font-size:28px}
.xianyu-title{font-size:14px;font-weight:600;color:#a07020;margin-bottom:3px}
.xianyu-sub{font-size:13px;color:#b08030}
.xianyu-badge{background:#fff3cc;color:#a07020;border:1px solid #e8c840;border-radius:4px;padding:1px 7px;font-size:11px;font-weight:500;margin-left:6px}
.admin-xianyu-id{font-size:12px;color:#a07020;margin-top:4px;background:#fff8ec;border:1px solid #f0d090;border-radius:6px;padding:5px 10px;display:inline-block}
@media(max-width:640px){
  .header,.footer{padding:14px 18px}
  .upload-main,.order-main,.admin-main{padding:28px 14px 56px}
  .form-card,.order-card,.admin-card{padding:20px 16px}
  .service-cards{grid-template-columns:1fr}
  .admin-card-header{flex-direction:column}
  .admin-actions{align-items:flex-start;width:100%}
  .req-list{grid-template-columns:1fr}
  .pay-qr-img{width:160px;height:160px}
}
</style>
</head>

<div id="site-bg"></div><div id="site-bg2"></div>
<div id="site-bg-2"></div>
<div id="app"><div style="padding:120px;text-align:center;color:#9e9b96">加载中…</div></div>
<script>
// Prevent right-click and long-press save on preview images
document.addEventListener('contextmenu', e => {
  if (e.target.classList.contains('preview-thumb')) e.preventDefault();
});
document.addEventListener('touchstart', e => {
  if (e.target.classList.contains('preview-thumb')) e.preventDefault();
}, { passive: false });
</script>
